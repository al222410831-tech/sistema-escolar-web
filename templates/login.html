<!DOCTYPE html>
<html>
<head>
    <title>Login Sistema Escolar</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 100px; background: #e5e5e5; }
        .login-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { display: block; margin-bottom: 10px; padding: 10px; width: 200px; }
        button { background: #007bff; color: white; border: none; padding: 10px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>🔑 Iniciar Sesión</h2>
        <form action="/validar" method="POST">
            <input type="text" name="usuario" placeholder="Matrícula (111 o 222)" required>
            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
