<!DOCTYPE html>
<html>
<head>
    <title>Login - SIAGE</title>
    <style>
        body { background-color: #b36b2d; font-family: sans-serif; display: flex; justify-content: center; padding-top: 100px; }
        .card { background: white; padding: 20px; border-radius: 10px; text-align: center; }
        input { display: block; margin: 10px auto; padding: 10px; }
        button { background: #333; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Introduce tu Matrícula</h2>
        <form action="/validar" method="POST">
            <input type="text" name="usuario" placeholder="Ej: 111... o 222..." required>
            <button type="submit">Entrar al Sistema</button>
        </form>
    </div>
</body>
</html>
