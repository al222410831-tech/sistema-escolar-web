<!DOCTYPE html>
<html>
<head>
    <title>Sistema Escolar Daniel</title>
    <style>
        body { font-family: sans-serif; margin: 50px; background: #f4f4f4; }
        .caja { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="caja">
        <h1>🏫 Sistema Escolar Daniel</h1>
        <form action="/registrar" method="POST">
            <input type="text" name="nombre" placeholder="Nombre del Alumno" required>
            <input type="text" name="grado" placeholder="Grado (ej. 1ro B)" required>
            <button type="submit">Registrar en MongoDB</button>
        </form>
        <hr>
        <h2>Lista de Alumnos:</h2>
        <ul>
            {% for alumno in alumnos %}
            <li><strong>{{ alumno.nombre }}</strong> - {{ alumno.grado }}</li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
