<!DOCTYPE html>
<html>
<head>
    <title>Maestro SIAGE</title>
    <style>
        body { background-color: #b36b2d; font-family: sans-serif; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; border: 3px solid #333; max-width: 1100px; margin: auto; text-align: center; }
        select, button { padding: 10px; margin: 10px; border: 2px solid #333; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 8px; font-size: 13px; }
        .seccion { display: none; margin-top: 20px; }
        .visible { display: block; }
    </style>
    <script>
        function seleccionarMateria() {
            let mat = document.getElementById('materia_select').value;
            document.getElementById('tabla_alumnos').classList.add('visible');
            document.querySelectorAll('.label_materia').forEach(el => el.innerText = mat);
            document.querySelectorAll('.input_materia').forEach(el => el.value = mat);
        }
    </script>
</head>
<body>
    <div class="card">
        <h2>👨‍🏫 Panel del Maestro: {{ user.nombre }}</h2>
        <p>Gestionando grupo: <strong>{{ user.semestre }}</strong></p>
        <hr>
        
        <h3>¿Qué materia desea calificar hoy?</h3>
        <select id="materia_select">
            <option value="{{ user.materia1 }}">{{ user.materia1 }}</option>
            <option value="{{ user.materia2 }}">{{ user.materia2 }}</option>
        </select>
        <button onclick="seleccionarMateria()" style="background: #333; color: white;">CARGAR GRUPO</button>

        <div id="tabla_alumnos" class="seccion">
            <h3 style="color: blue;">Cargando: <span class="label_materia"></span></h3>
            <table>
                <tr style="background: #eee;">
                    <th>Alumno</th>
                    <th>N1</th><th>N2</th><th>N3</th><th>N4</th>
                    <th>Reporte</th>
                    <th>Acción</th>
                </tr>
                {% for al in alumnos %}
                <form action="/guardar_materia" method="POST">
                    <input type="hidden" name="matricula" value="{{ al.matricula }}">
                    <input type="hidden" name="materia_nombre" class="input_materia">
                    <tr>
                        <td>{{ al.nombre }}</td>
                        <td><input type="number" name="n1" step="0.1" style="width:40px"></td>
                        <td><input type="number" name="n2" step="0.1" style="width:40px"></td>
                        <td><input type="number" name="n3" step="0.1" style="width:40px"></td>
                        <td><input type="number" name="n4" step="0.1" style="width:40px"></td>
                        <td><input type="text" name="reporte" placeholder="Conducta..."></td>
                        <td><button type="submit" style="background: green; color: white; border: none; padding: 5px 10px; cursor: pointer;">Guardar</button></td>
                    </tr>
                </form>
                {% endfor %}
            </table>
        </div>
        <br><br>
        <a href="/" style="color: red; font-weight: bold; text-decoration: none;">Cerrar Sesión</a>
    </div>
</body>
</html>
