<!DOCTYPE html>
<html>
<head>
    <title>Maestro SIAGE</title>
    <style>
        body { background:#b36b2d; font-family:sans-serif; padding:10px; }
        .card { background:white; padding:15px; border-radius:15px; border:3px solid #333; max-width:1000px; margin:auto; box-shadow:8px 8px 0px #333; }
        .sec { display:none; margin-top:15px; }
        table { width:100%; border-collapse:collapse; font-size:10px; background:white; }
        th, td { border:1px solid #333; padding:3px; text-align:center; }
        button { cursor:pointer; font-weight:bold; padding:8px; margin:5px; border-radius:5px; }
    </style>
    <script>
        function ver(id) {
            document.querySelectorAll('.sec').forEach(s => s.style.display='none');
            var seccion = document.getElementById(id);
            if(seccion) seccion.style.display='block';
        }
    </script>
</head>
<body>
    <div class="card">
        <h2>👨‍🏫 PANEL DE CONTROL MAESTRO</h2>
        <button onclick="ver('sec_calif')">📊 CALIFICAR</button>
        <button onclick="ver('sec_horario')">📅 HORARIOS SEMANALES</button>
        <button onclick="ver('sec_reportes')" style="background:#e67e22; color:white;">📝 REPORTES Y ANÁLISIS</button>
        <a href="/"><button style="background:red; color:white;">SALIR</button></a>

        <div id="sec_calif" class="sec">
            <h3>Asignar Calificaciones</h3>
            <table>
                <tr style="background:#eee;"><th>Alumno</th><th>Materia</th><th>N1</th><th>N2</th><th>N3</th><th>N4</th><th>Acción</th></tr>
                {% for al in alumnos %}
                <form action="/guardar_materia" method="POST">
                    <input type="hidden" name="matricula" value="{{ al.matricula }}">
                    <tr>
                        <td>{{ al.nombre }}</td>
                        <td><select name="materia_nombre"><option>{{ user.materia1 }}</option><option>{{ user.materia2 }}</option></select></td>
                        <td><input type="number" name="n1" step="0.1" style="width:35px"></td>
                        <td><input type="number" name="n2" step="0.1" style="width:35px"></td>
                        <td><input type="number" name="n3" step="0.1" style="width:35px"></td>
                        <td><input type="number" name="n4" step="0.1" style="width:35px"></td>
                        <td><button type="submit" style="background:green; color:white;">OK</button></td>
                    </tr>
                </form>
                {% endfor %}
            </table>
        </div>

        <div id="sec_horario" class="sec">
            <h3>📅 Gestión de Horario</h3>
            <form action="/guardar_horario" method="POST">
                <select name="cuatrimestre">
                    {% for i in range(1,10) %}<option value="{{i}}° CUATRIMESTRE">{{i}}° CUATRIMESTRE</option>{% endfor %}
                </select>
                <button type="submit" style="width:100%; background:blue; color:white; padding:15px; margin-top:10px;">GUARDAR HORARIO SEMANAL</button>
            </form>
        </div>

        <div id="sec_reportes" class="sec">
            <div style="background: #f9f9f9; padding: 20px; border-radius: 10px; border: 2px solid #333; margin-top:15px; color: #333;">
                <h3>📝 Enviar Reporte</h3>
                <form action="/mandar_reporte" method="POST">
                    <input type="text" name="matricula" placeholder="Matrícula" required style="width: 90%; padding: 10px; margin-bottom: 10px;">
                    <textarea name="descripcion" placeholder="Motivo..." required style="width: 90%; height: 80px;"></textarea>
                    <button type="submit" style="background:#dc3545; color:white; width: 100%; padding: 12px;">ENVIAR REPORTE</button>
                </form>
                <hr>
                <a href="/dashboard"><button type="button" style="background:#17a2b8; color:white; width: 100%; padding: 12px;">VER GRÁFICAS DE ANÁLISIS</button></a>
            </div>
        </div>
    </div>
</body>
</html>
