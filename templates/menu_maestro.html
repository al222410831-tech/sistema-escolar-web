<!DOCTYPE html>
<html>
<head>
    <title>SIAGE - Maestro</title>
    <style>
        body { background-color: #b36b2d; font-family: sans-serif; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; border: 3px solid #333; max-width: 900px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #333; padding: 8px; text-align: center; color: #333; }
        th { background: #333; color: white; }
        .btn { background: #333; color: white; padding: 5px 10px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>👨‍🏫 Panel del Maestro: {{ user.nombre }}</h2>
        <p>Grupo: <strong>{{ user.semestre }}</strong></p>
        <hr>
        <h3>LISTA DE ALUMNOS</h3>
        <table>
            <tr>
                <th>Nombre</th>
                <th>Matrícula</th>
                <th>Calificación</th>
                <th>Reporte</th>
                <th>Acción</th>
            </tr>
            {% for al in alumnos %}
            <form action="/guardar_nota" method="POST">
                <tr>
                    <td>{{ al.nombre }}</td>
                    <td><input type="hidden" name="matricula" value="{{ al.matricula }}">{{ al.matricula }}</td>
                    <td><input type="number" name="calificacion" value="{{ al.calificacion }}" step="0.1" min="0" max="10"></td>
                    <td><input type="text" name="reporte" value="{{ al.reporte }}"></td>
                    <td><button type="submit" class="btn">Guardar</button></td>
                </tr>
            </form>
            {% endfor %}
        </table>
        <br>
        <a href="/" style="color: red;">Cerrar Sesión</a>
    </div>
</body>
</html>
